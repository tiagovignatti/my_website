{{ define "main" }}
<article>
  <header class="about-header">
    <span class="about-label">About</span>
    <h1 class="about-name">Tiago Vignatti</h1>
    <p class="about-subtitle">Software engineer and open-source technologist.</p>
  </header>
  <section class="flex flex-col max-w-full mt-0 prose dark:prose-invert">
    <div class="min-w-0 min-h-0 max-w-full">
      {{ .Content }}
    </div>
  </section>
</article>

<script>
(function() {
  var quotes = {{ site.Data.quotes | jsonify | safeJS }};
  var anchor = document.getElementById('a-quote');
  if (!anchor || !quotes || quotes.length < 2) return;

  var heading = anchor.closest('h3');
  if (!heading) return;

  heading.style.cursor = 'pointer';

  var quoteEl = heading.nextElementSibling;
  if (!quoteEl) return;

  var currentIndex = 0;

  heading.addEventListener('click', function(e) {
    e.preventDefault();
    var newIndex;
    do {
      newIndex = Math.floor(Math.random() * quotes.length);
    } while (newIndex === currentIndex);
    currentIndex = newIndex;
    var q = quotes[currentIndex];
    quoteEl.textContent = '\u201C' + q.text + '\u201D, ' + q.author;
  });
})();
</script>
{{ end }}
